services:
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
      secrets:
        - pip_conf
    container_name: bgk-mcp-server
    restart: unless-stopped
    ports:
      - "8010:8000"
    env_file:
      - path: .env
        required: false
    environment:
      MCP_ALLOWED_LOG_PATHS: ${MCP_ALLOWED_LOG_PATHS:-/logs/sample_app.log,/host/var/log/messages,/host/var/log/app.log}
      MCP_MAX_LOG_LINES: ${MCP_MAX_LOG_LINES:-500}
      MCP_MAX_LOG_LINES_HARD_LIMIT: ${MCP_MAX_LOG_LINES_HARD_LIMIT:-2000}
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
    volumes:
      - /etc/pki/tls/certs/ca-bundle.crt:/etc/pki/tls/certs/ca-bundle.crt:ro
      - /var/log/messages:/host/var/log/messages:ro
      # - /var/log/app.log:/host/var/log/app.log:ro

secrets:
  pip_conf:
    file: /etc/pip.conf
  ca_cert:
    file: /etc/pki/ca-trust/source/anchors/bank-jfrog-ca.crt
